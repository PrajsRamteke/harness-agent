<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Graph — harness</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;overflow:hidden;height:100vh;}
  #header{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,#161b22 0%,#0d1117 100%);border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:20px;backdrop-filter:blur(12px);}
  h1{font-size:18px;font-weight:600;background:linear-gradient(135deg,#58a6ff,#79c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #stats{display:flex;gap:16px;font-size:13px;color:#8b949e;}
  #stats span{background:#21262d;padding:2px 10px;border-radius:12px;}
  #search{margin-left:auto;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 14px;color:#c9d1d9;font-size:13px;width:220px;outline:none;transition:border-color .2s;}
  #search:focus{border-color:#58a6ff;}#search::placeholder{color:#484f58;}
  #legend{display:flex;gap:12px;font-size:11px;color:#8b949e;align-items:center;}
  .legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;}
  #tooltip{position:fixed;z-index:200;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 18px;font-size:13px;max-width:420px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 32px rgba(0,0,0,.5);line-height:1.5;}
  #tooltip .tt-name{font-weight:600;color:#f0f6fc;font-size:15px;margin-bottom:6px;}
  #tooltip .tt-path{color:#8b949e;font-size:12px;font-family:'SF Mono','Monaco',monospace;margin-bottom:8px;}
  #tooltip .tt-section{color:#58a6ff;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:6px;}
  #tooltip .tt-items{color:#c9d1d9;font-family:'SF Mono','Monaco',monospace;font-size:12px;word-break:break-all;}
  svg{display:block;width:100%;height:100vh;}
  .node-circle{cursor:pointer;transition:r .15s;}
  .node-circle:hover{filter:brightness(1.3);}
  .node-label{font-size:12px;fill:#c9d1d9;font-family:'SF Mono','Monaco',monospace;pointer-events:none;}
  .link{fill:none;stroke:#30363d;stroke-width:1.5;stroke-opacity:.6;}
  .dir-label{fill:#58a6ff;font-weight:600;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;pointer-events:none;}
</style>
</head>
<body>

<div id="header">
  <h1>📊 harness</h1>
  <div id="stats">
    <span>📁 <span id="dirCount">0</span> dirs</span>
    <span>📄 <span id="fileCount">0</span> files</span>
    <span>🔍 <span id="scanCount">0</span> scanned</span>
  </div>
  <div id="legend">
    <span><span class="legend-dot" style="background:#58a6ff"></span>dir</span>
    <span><span class="legend-dot" style="background:#7ee787"></span>file</span>
    <span><span class="legend-dot" style="background:#d2a8ff"></span>entry</span>
  </div>
  <input id="search" type="text" placeholder="Search files…" spellcheck="false">
</div>

<div id="tooltip"></div>
<svg id="tree"></svg>

function buildHierarchy(d) {
  const files = d.tree || {};
  const dirMap = d.dirs || {};
  const root = { name: d.name || "project", children: [], path: "", depth: 0 };
  for (const [relpath, meta] of Object.entries(files)) {
    const parts = relpath.split("/");
    let node = root, curPath = "";
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      const isFile = i === parts.length - 1 && part.includes(".");
      curPath = curPath ? curPath + "/" + part : part;
      let child = node.children?.find(c => c.name === part);
      if (!child) {
        child = { name: part, path: curPath, children: [], isFile, depth: i, _meta: isFile ? meta : null };
        if (!node.children) node.children = [];
        node.children.push(child);
      }
      node = child;
    }
  }
  for (const [dirpath, children] of Object.entries(dirMap)) {
    if (dirpath === "") continue;
    const parts = dirpath.split("/");
    let node = root, found = true, curPath = "";
    for (let i = 0; i < parts.length; i++) {
      curPath = curPath ? curPath + "/" + parts[i] : parts[i];
      const child = node.children?.find(c => c.name === parts[i]);
      if (!child) { found = false; break; }
      node = child;
    }
    if (!found) {
      node = root; curPath = "";
      for (let i = 0; i < parts.length; i++) {
        curPath = curPath ? curPath + "/" + parts[i] : parts[i];
        let child = node.children?.find(c => c.name === parts[i]);
        if (!child) {
          child = { name: parts[i], path: curPath, children: [], isFile: false, depth: i, _meta: null };
          if (!node.children) node.children = [];
          node.children.push(child);
        }
        node = child;
      }
      for (const fc of (children || []).filter(c => c.includes("."))) {
        if (!node.children?.find(c => c.name === fc)) {
          node.children.push({ name: fc, path: curPath + "/" + fc, children: [], isFile: true, depth: parts.length, _meta: files[curPath + "/" + fc] || null });
        }
      }
    }
  }
  function sortChildren(node) {
    if (node.children) {
      node.children.sort((a,b) => { if (a.isFile && !b.isFile) return 1; if (!a.isFile && b.isFile) return -1; return a.name.localeCompare(b.name); });
      node.children.forEach(sortChildren);
    }
  }
  sortChildren(root);
  return root;
}

const W = window.innerWidth, H = window.innerHeight;
const M = { top: 80, right: 40, bottom: 40, left: 280 };
const svg = d3.select("#tree");
svg.selectAll("*").remove();
const g = svg.append("g").attr("transform", "translate(" + M.left + "," + M.top + ")");

const treeLayout = d3.tree()
  .size([Math.max(H - M.top - M.bottom, DATA.scanned * 24), W - M.left - M.right - 40])
  .separation((a, b) => a.parent === b.parent ? 2.0 : 3.5);
const root = buildHierarchy(DATA);
const treeRoot = d3.hierarchy(root);
const links = treeLayout(treeRoot).links();

document.getElementById("dirCount").textContent = DATA.dirs ? Object.keys(DATA.dirs).length : 0;
document.getElementById("fileCount").textContent = DATA.files || 0;
document.getElementById("scanCount").textContent = DATA.scanned || 0;

g.selectAll(".link").data(links).join("path").attr("class","link")
  .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

const node = g.selectAll("g.node").data(treeRoot.descendants()).join("g")
  .attr("transform", d => "translate(" + d.y + "," + d.x + ")");

const isEntry = d => d.data._meta && DATA.entries && DATA.entries.includes(d.data.path);
const isDir = d => !d.data.isFile;
const hasKids = d => d.data.children && d.data.children.length > 0;

node.append("circle").attr("class","node-circle")
  .attr("r", d => isEntry(d) ? 8 : (isDir(d) ? (hasKids(d) ? 6 : 4) : 4.5))
  .attr("fill", d => isEntry(d) ? "#d2a8ff" : (isDir(d) ? "#58a6ff" : "#7ee787"))
  .attr("stroke", d => isEntry(d) ? "#bc8cff" : (isDir(d) ? "#1f6feb" : "#238636"))
  .attr("stroke-width", 1.5)
  .on("mouseenter", showTooltip).on("mousemove", moveTooltip).on("mouseleave", hideTooltip);

node.append("text")
  .attr("class", d => d.data.isFile ? "node-label" : "dir-label")
  .attr("dx", d => isDir(d) ? -12 : 10).attr("dy", 4)
  .attr("text-anchor", d => isDir(d) ? "end" : "start")
  .each(function(d) {
    const el = d3.select(this);
    let text = d.data.name.length > 45 ? d.data.name.slice(0, 42) + "\u2026" : d.data.name;
    if (d.data.isFile && d.data._meta && d.data._meta.e && d.data._meta.e.length) {
      text += " \u2192 " + d.data._meta.e.slice(0, 2).join(", ") + (d.data._meta.e.length > 2 ? "\u2026" : "");
    }
    el.text(text);
  });

const tooltip = document.getElementById("tooltip");
function showTooltip(e, d) {
  const meta = d.data._meta;
  let html = '<div class="tt-name">' + d.data.name + '</div>';
  html += '<div class="tt-path">' + d.data.path + '</div>';
  if (isEntry(d)) html += '<div class="tt-section">\ud83d\udccc Entry Point</div>';
  if (meta) {
    if (meta.e && meta.e.length) {
      html += '<div class="tt-section">\u2192 Exports</div>';
      html += '<div class="tt-items">' + meta.e.join(", ") + '</div>';
    }
    if (meta.i && meta.i.length) {
      html += '<div class="tt-section">\u2190 Imports</div>';
      html += '<div class="tt-items">' + meta.i.slice(0, 15).join("<br>") + '</div>';
      if (meta.i.length > 15) html += '<div style="color:#484f58;font-size:11px">... ' + (meta.i.length - 15) + ' more</div>';
    }
  } else if (isDir(d)) {
    html += '<div style="color:#8b949e;font-size:12px">' + (d.data.children?.length || 0) + ' items</div>';
  }
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
}
function moveTooltip(e) {
  let x = e.clientX + 16, y = e.clientY - 10;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - 16;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - 10;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}
function hideTooltip() { tooltip.style.opacity = 0; }

const zoom = d3.zoom().scaleExtent([0.2, 5])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(M.left, M.top));

document.getElementById("search").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { node.style("opacity", 1); svg.selectAll(".link").style("opacity", 0.6); return; }
  node.each(function(d) {
    const match = d.data.path.toLowerCase().includes(q) ||
      d.data.name.toLowerCase().includes(q) ||
      (d.data._meta?.e || []).some(e => e.toLowerCase().includes(q));
    d3.select(this).style("opacity", match ? 1 : 0.08);
  });
  svg.selectAll(".link").style("opacity", function(d) {
    return (d.source.data.path.toLowerCase().includes(q) || d.target.data.path.toLowerCase().includes(q)) ? 0.6 : 0.04;
  });
});

window.addEventListener("resize", () => { svg.attr("width", W).attr("height", H); });

setTimeout(() => {
  const bounds = g.node()?.getBBox();
  if (bounds) {
    const s = Math.min((window.innerWidth - 80) / (bounds.width || 1), (window.innerHeight - 80) / (bounds.height || 1));
    if (s < 1) { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(M.left + 20, M.top + 20).scale(s * 0.9)); }
  }
}, 100);
</script>
